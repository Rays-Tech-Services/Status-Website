<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Status — Ray's Tech Services</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1422;
      color: #e8edf5;
      min-height: 100vh;
    }

    header {
      background: #111c2e;
      border-bottom: 1px solid #1e2f4a;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header img { height: 40px; width: auto; }

    header span {
      color: #7a90b8;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-left: 1px solid #1e2f4a;
      padding-left: 16px;
    }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    #banner {
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #1e2f4a;
      background: #152038;
    }

    .b-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    #banner-title { font-size: 16px; font-weight: 600; }
    #banner-sub   { font-size: 13px; color: #7a90b8; margin-top: 2px; }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #7a90b8;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    #services { display: flex; flex-direction: column; gap: 8px; }

    .card {
      background: #152038;
      border: 1px solid #1e2f4a;
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .card .name { font-size: 14px; font-weight: 600; }
    .card .desc { font-size: 12px; color: #7a90b8; margin-top: 3px; }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .dot { width: 6px; height: 6px; border-radius: 50%; }

    .up       { background: rgba(34,217,122,.1); color: #22d97a; border: 1px solid rgba(34,217,122,.2); }
    .up .dot  { background: #22d97a; }
    .b-up     { background: rgba(34,217,122,.07); border-color: rgba(34,217,122,.3) !important; }
    .b-up .b-dot { background: #22d97a; }

    .degraded      { background: rgba(245,166,35,.1); color: #f5a623; border: 1px solid rgba(245,166,35,.2); }
    .degraded .dot { background: #f5a623; }
    .b-degraded    { background: rgba(245,166,35,.07); border-color: rgba(245,166,35,.3) !important; }
    .b-degraded .b-dot { background: #f5a623; }

    .down      { background: rgba(240,71,71,.1); color: #f04747; border: 1px solid rgba(240,71,71,.2); }
    .down .dot { background: #f04747; }
    .b-down    { background: rgba(240,71,71,.07); border-color: rgba(240,71,71,.3) !important; }
    .b-down .b-dot { background: #f04747; }

    #error {
      display: none;
      background: rgba(240,71,71,.1);
      border: 1px solid rgba(240,71,71,.25);
      border-radius: 8px;
      padding: 14px 18px;
      color: #f04747;
      font-size: 13px;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #4a5f7a;
      padding: 0 20px 24px;
    }

    footer a { color: #5b8def; text-decoration: none; }
  </style>
</head>

  <span>Service Status</span>

<main>
  <div id="banner">
    <div class="b-dot"></div>
    <div>
      <div id="banner-title">Loading…</div>
      <div id="banner-sub">Fetching status</div>
    </div>
  </div>

  <div class="section-label">
    <span>Services</span>
    <span id="updated"></span>
  </div>

  <div id="error">⚠ Could not load status.json. Make sure the file exists in the same directory.</div>
  <div id="services"></div>
</main>

<footer>
  <a href="https://raystechservices.com">raystechservices.com</a> &nbsp;·&nbsp; Stafford, CT
</footer>

<script>
  const bannerCopy = {
    up:       { title: 'All Systems Operational',    sub: 'Everything is running smoothly.' },
    degraded: { title: 'Partial Service Disruption', sub: 'Some services are experiencing issues.' },
    down:     { title: 'Major Outage Detected',      sub: 'One or more services are down.' },
  };

  function key(s) { return s.toLowerCase(); }

  function overall(services) {
    if (services.some(s => key(s.status) === 'down'))     return 'down';
    if (services.some(s => key(s.status) === 'degraded')) return 'degraded';
    return 'up';
  }

  function fmt(iso) {
    try {
      return 'Updated ' + new Date(iso).toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
    } catch { return ''; }
  }

  fetch('status.json?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      const o = overall(data.services);
      const banner = document.getElementById('banner');
      banner.classList.add('b-' + o);
      banner.querySelector('.b-dot').style.background =
        o === 'up' ? '#22d97a' : o === 'degraded' ? '#f5a623' : '#f04747';
      document.getElementById('banner-title').textContent = bannerCopy[o].title;
      document.getElementById('banner-sub').textContent   = bannerCopy[o].sub;
      document.getElementById('updated').textContent      = fmt(data.updated);

      const list = document.getElementById('services');
      data.services.forEach(svc => {
        const k = key(svc.status);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div>
            <div class="name">${svc.name}</div>
            <div class="desc">${svc.description}</div>
          </div>
          <div class="badge ${k}"><span class="dot"></span>${svc.status}</div>
        `;
        list.appendChild(card);
      });
    })
    .catch(() => {
      document.getElementById('error').style.display = 'block';
      document.getElementById('banner-title').textContent = 'Status Unavailable';
      document.getElementById('banner-sub').textContent   = 'Could not load status.json.';
      document.getElementById('banner').classList.add('b-down');
    });
</script>
</body>
